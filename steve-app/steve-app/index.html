<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Steve – Focusmate by Alumni AI</title>
<link rel="stylesheet" href="css/style.css"/>
<style>
body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
.welcome-wrap {
  width: 100%; max-width: 420px; padding: 2.5rem 1.5rem;
  display: flex; flex-direction: column; align-items: center; text-align: center;
  position: relative; z-index: 1;
  animation: pageIn .5s cubic-bezier(.34,1.45,.64,1) both;
}
.logo-box {
  width: 100px; height: 100px;
  background: linear-gradient(145deg, #6c63ff, #38bdf8);
  border-radius: 28px;
  display: flex; align-items: center; justify-content: center;
  font-size: 46px; margin-bottom: 2rem;
  box-shadow: 0 0 0 12px rgba(108,99,255,.1), 0 0 80px rgba(108,99,255,.35);
  animation: logoPulse 3.5s ease-in-out infinite;
}
@keyframes logoPulse {
  0%,100% { box-shadow: 0 0 0 12px rgba(108,99,255,.1), 0 0 80px rgba(108,99,255,.35); }
  50%      { box-shadow: 0 0 0 20px rgba(108,99,255,.07), 0 0 120px rgba(108,99,255,.5); }
}
h1 {
  font-size: 3.2rem; font-weight: 900; line-height: 1.05;
  background: linear-gradient(135deg, #fff 30%, var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: .4rem;
}
.tagline { color: var(--text2); font-size: 1rem; margin-bottom: .35rem; }
.brand {
  font-size: .78rem; font-weight: 800; letter-spacing: .12em;
  text-transform: uppercase; color: var(--accent2); margin-bottom: 3rem;
  display: inline-flex; align-items: center; gap: 6px;
}
.brand::before, .brand::after {
  content: ''; height: 1px; width: 28px;
  background: linear-gradient(90deg, transparent, var(--accent2));
}
.brand::after { transform: scaleX(-1); }
.actions { width: 100%; display: flex; flex-direction: column; gap: 12px; }
.btn-hero {
  width: 100%; padding: 1.05rem;
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  color: #fff; border-radius: var(--r2);
  font-size: 1rem; font-weight: 800; letter-spacing: .02em;
  transition: all .25s; box-shadow: 0 4px 24px rgba(108,99,255,.3);
}
.btn-hero:hover  { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(108,99,255,.45); }
.btn-hero:active { transform: scale(.98); }
.btn-outline {
  width: 100%; padding: 1.05rem;
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text); border-radius: var(--r2);
  font-size: 1rem; font-weight: 700; transition: all .25s;
}
.btn-outline:hover  { background: var(--surface3); border-color: var(--accent); }
.btn-outline:active { transform: scale(.98); }
.coming-soon-link {
  margin-top: 2rem; font-size: .8rem; color: var(--text3);
}
.coming-soon-link a { color: var(--accent2); font-weight: 700; }
.coming-soon-link a:hover { text-decoration: underline; }
.dots { display: flex; gap: 6px; justify-content: center; margin-top: 2.5rem; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border2); transition: all .3s; }
.dot.active { background: var(--accent); width: 22px; border-radius: 4px; }
.features-row {
  display: flex; gap: 8px; margin-bottom: 2.5rem; flex-wrap: wrap; justify-content: center;
}
.feat-pill {
  padding: 5px 12px; border-radius: 99px;
  background: var(--surface2); border: 1px solid var(--border);
  font-size: .75rem; font-weight: 700; color: var(--text2);
  display: inline-flex; align-items: center; gap: 5px;
}
</style>
</head>
<body>
<div class="bubbles" id="bubbles"></div>
<div class="welcome-wrap page-wrap">
  <div class="logo-box">🧠</div>
  <h1>Steve</h1>
  <p class="tagline">Your intelligent study companion</p>
  <div class="brand">✦ Alumni AI ✦</div>

  <div class="features-row">
    <span class="feat-pill">⏱ Focus Timer</span>
    <span class="feat-pill">📝 Notes</span>
    <span class="feat-pill">🎯 Goals</span>
    <span class="feat-pill">📅 Calendar</span>
    <span class="feat-pill">🔢 Calculator</span>
  </div>

  <div class="actions">
    <button class="btn-hero" onclick="goSignup()">Get Started — It's Free</button>
    <button class="btn-outline" onclick="goLogin()">I already have an account</button>
  </div>

  <div class="dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <p class="coming-soon-link">
    Powered by <a href="pages/coming-soon.html">Alumni AI – Coming Soon ›</a>
  </p>
</div>

<script src="js/app.js"></script>
<script>
  const user = Store.get('user');
  if (user) window.location.href = 'pages/dashboard.html';

  function goSignup() { window.location.href = 'pages/auth.html?mode=signup'; }
  function goLogin()  { window.location.href = 'pages/auth.html?mode=login';  }

  // Animate dots
  let dotIdx = 0;
  const dots = document.querySelectorAll('.dot');
  setInterval(() => {
    dots.forEach((d,i) => d.classList.toggle('active', i === dotIdx));
    dotIdx = (dotIdx + 1) % dots.length;
  }, 2000);
</script>
</body>
</html>
