<title>Steve – A Focusmate from Alumni AI</title>

<style>
:root {
  --bg: #0a0a12;
  --bg2: #111120;
  --bg3: #1a1a2e;
  --surface: rgba(255,255,255,0.05);
  --surface2: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.1);
  --border2: rgba(255,255,255,0.18);
  --text: #f0f0ff;
  --text2: rgba(240,240,255,0.6);
  --text3: rgba(240,240,255,0.35);
  --accent: #6c63ff;
  --accent2: #a78bfa;
  --accent3: #38bdf8;
  --green: #34d399;
  --amber: #fbbf24;
  --red: #f87171;
  --pink: #f472b6;
  --radius: 16px;
  --radius2: 24px;
  --radius3: 12px;
  --nav-h: 72px;
  --font: 'Nunito', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh}
button{font-family:var(--font);cursor:pointer;border:none;outline:none}
input,textarea{font-family:var(--font)}

/* Bubbles BG */
.bubbles-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bubble{position:absolute;border-radius:50%;opacity:0.06;animation:floatBubble linear infinite}
@keyframes floatBubble{0%{transform:translateY(110vh) scale(0.8)}100%{transform:translateY(-20vh) scale(1.2)}}

/* Screen System */
.screen{display:none;position:fixed;inset:0;z-index:10;flex-direction:column;animation:screenIn 0.45s cubic-bezier(.34,1.56,.64,1) forwards}
.screen.active{display:flex}
@keyframes screenIn{from{opacity:0;transform:scale(0.94) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* ===== WELCOME ===== */
#welcome{background:linear-gradient(145deg,#0a0a12 0%,#12102a 50%,#0d1a2e 100%);justify-content:center;align-items:center}
.welcome-content{text-align:center;padding:2rem;max-width:420px;width:100%}
.steve-logo{width:96px;height:96px;background:linear-gradient(135deg,var(--accent),var(--accent3));border-radius:28px;display:flex;align-items:center;justify-content:center;margin:0 auto 2rem;font-size:42px;box-shadow:0 0 60px rgba(108,99,255,0.4),0 0 120px rgba(108,99,255,0.15);animation:logoPulse 3s ease-in-out infinite}
@keyframes logoPulse{0%,100%{box-shadow:0 0 60px rgba(108,99,255,0.4),0 0 120px rgba(108,99,255,0.15)}50%{box-shadow:0 0 80px rgba(108,99,255,0.6),0 0 160px rgba(108,99,255,0.25)}}
.welcome-title{font-size:3rem;font-weight:800;background:linear-gradient(135deg,#fff,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;margin-bottom:.5rem}
.welcome-sub{color:var(--text2);font-size:1rem;margin-bottom:.5rem;font-weight:400}
.welcome-brand{color:var(--accent2);font-size:.85rem;font-weight:600;letter-spacing:.05em;margin-bottom:2.5rem;text-transform:uppercase}
.btn-primary{width:100%;padding:1rem;background:linear-gradient(135deg,var(--accent),#8b5cf6);border-radius:var(--radius);font-size:1rem;font-weight:700;color:#fff;margin-bottom:.75rem;transition:all .25s;letter-spacing:.02em}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(108,99,255,0.4)}
.btn-primary:active{transform:scale(0.98)}
.btn-secondary{width:100%;padding:1rem;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);font-size:1rem;font-weight:600;color:var(--text);transition:all .25s}
.btn-secondary:hover{background:var(--surface);border-color:var(--accent)}
.welcome-dots{display:flex;gap:8px;justify-content:center;margin-top:2rem}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border2)}
.dot.active{background:var(--accent);width:24px;border-radius:4px}

/* ===== AUTH ===== */
#auth{background:var(--bg);overflow-y:auto}
.auth-wrap{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:2rem}
.auth-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:2rem;width:100%;max-width:400px}
.auth-header{text-align:center;margin-bottom:1.5rem}
.auth-header h2{font-size:1.6rem;font-weight:800;margin-bottom:.3rem}
.auth-header p{color:var(--text2);font-size:.9rem}
.tab-row{display:flex;background:var(--surface);border-radius:var(--radius3);padding:4px;margin-bottom:1.5rem;gap:4px}
.tab-btn{flex:1;padding:.5rem;border-radius:10px;font-size:.9rem;font-weight:600;color:var(--text2);background:transparent;transition:all .25s}
.tab-btn.active{background:var(--accent);color:#fff}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.05em}
